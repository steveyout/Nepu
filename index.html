<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>nepu – Watch Free Movies & TV Shows in High Quality</title>
    
    <!-- Robust fix for "Cannot set property fetch of #<Window> which has only a getter" -->
    <script>
      (function() {
        try {
          const originalFetch = window.fetch;
          let currentFetch = originalFetch;
          Object.defineProperty(window, 'fetch', {
            get: function() {
              return currentFetch;
            },
            set: function(val) {
              currentFetch = val;
            },
            configurable: true,
            enumerable: true
          });
        } catch (e) {
          console.warn('Unable to patch window.fetch property descriptor:', e);
        }
      })();
    </script>
    
    <!-- Dynamically load Google Analytics only on production domains -->
    <script>
      (function() {
        const prodDomains = ['nepu.live', 'nepoflix.site', 'coreflix.online', 'cineby.works', 'cineby.rest'];
        const isProd = prodDomains.some(function(domain) {
          return window.location.hostname.includes(domain);
        });
        if (isProd) {
          const gTagScript = document.createElement('script');
          gTagScript.async = true;
          gTagScript.src = 'https://www.googletagmanager.com/gtag/js?id=G-RQTT2RYDQ7';
          document.head.appendChild(gTagScript);

          window.dataLayer = window.dataLayer || [];
          window.gtag = function() { window.dataLayer.push(arguments); };
          window.gtag('js', new Date());
          window.gtag('config', 'G-RQTT2RYDQ7');
        }
      })();
    </script>
    
    <!-- Speed & Performance optimizations: Preconnect to font and image servers -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link rel="preconnect" href="https://image.tmdb.org" />
    <link rel="dns-prefetch" href="https://image.tmdb.org" />
    
    <!-- Parallel loading of fonts to avoid render-blocking CSS imports -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Outfit:wght@300;400;500;600;700;800&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet" />
    
    <!-- SEO Optimization: Sitemap linkage -->
    <link rel="sitemap" type="application/xml" title="Sitemap" href="/sitemap.xml" />
    
    <!-- Primary Metadata -->
    <meta name="description" content="nepu – Stream HD movies and TV shows for free, ad-free, and no subscriptions needed. Enjoy endless entertainment instantly!" />
    <meta name="robots" content="index, follow" />
    <meta name="keywords" content="nepu, nepu stream, nepu movie player, free movies, stream tv shows, pinkish glassmorphism player, vidking premium, responsive bottom bar, clean typography" />
  </head>
  <body class="overflow-x-hidden">
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
